<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>
<body>

    <!-- Decoraciones -->
    <div class="decoracion">
        <div class="estrella">⭐</div>
        <div class="estrella">🌈</div>
        <div class="estrella">🎈</div>
        <div class="estrella">🧸</div>
    </div>

    <div class="input-group">
        <label for="respuesta">💡 PRACTICA LA TABLA DEL...</label>
        <input type="number" id="respuesta" placeholder="3">
    </div>

    <header>
        <button class="btn-probar" onclick="generarTablas()">🎮 PROBAR</button>
    </header>

    <main class="card">
        <h1 id="titulo">🎈 Tabla del 3 🎈</h1>

        <div class="tabla-container" id="divTabla">
            <table>
                <thead>
                    <tr>
                        <th>Operación</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>3 x 1</td><td>3</td></tr>
                    <tr><td>3 x 2</td><td>6</td></tr>
                    <tr><td>3 x 3</td><td>9</td></tr>
                    <tr><td>3 x 4</td><td>12</td></tr>
                    <tr><td>3 x 5</td><td>15</td></tr>
                    <tr><td>3 x 6</td><td>18</td></tr>
                    <tr><td>3 x 7</td><td>21</td></tr>
                    <tr><td>3 x 8</td><td>24</td></tr>
                    <tr><td>3 x 9</td><td>27</td></tr>
                    <tr><td>3 x 10</td><td>30</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>✨ Creado por: Lett ✨</p>
    </footer>

</body>
</html>
